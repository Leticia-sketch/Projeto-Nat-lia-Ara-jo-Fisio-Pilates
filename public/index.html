<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <title>Natália Araújo - Fisio Pilates</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">Página Inicial</a></li>
                <li><a href="#estudio">Estúdio</a></li>
                <li><a href="#sobre">Sobre mim</a></li>
                <li><a href="#servicos">Serviços</a></li>
                <li><a href="#planos">Planos</a></li>
                <li><a href="#depoimentos">Depoimentos</a></li>
                <li><a href="#footer">Contato</a></li>
                <li><a href="login.html" class="login-btn">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1 id="tituloHero"></h1>
            <a href="#" class="btn" id="botaoHero"></a>
        </div>
    </section>

    <section class="estudio" id="estudio">
        <div class="estudio-grid">
            <div class="relative w-[400px] overflow-hidden rounded-2xl" id="carousel">

                <div class="flex transition-transform duration-500 items-center" id="carouselTrack">
                    <img src="img/studio1.jpeg" class="carousel-item">
                    <img src="img/studio2.jpeg" class="carousel-item">
                    <img src="img/studio3.jpeg" class="carousel-item">
                    <img src="img/studio4.jpeg" class="carousel-item">
                </div>

                <button id="prev" class="absolute left-4 top-1/2 -translate-y-1/2 
bg-white/80 backdrop-blur-md 
w-10 h-10 flex items-center justify-center 
rounded-full shadow-lg hover:scale-110 transition">
                    ❮
                </button>

                <button id="next" class="absolute right-4 top-1/2 -translate-y-1/2 
bg-white/80 backdrop-blur-md 
w-10 h-10 flex items-center justify-center 
rounded-full shadow-lg hover:scale-110 transition">
                    ❯
                </button>
            </div>
            <div class="estudio-texto">
                <h2 id="tituloEstudio"></h2>
                <p id="textoEstudio"></p>
            </div>
        </div>
    </section>

    <section class="sobre" id="sobre">
        <div class="sobre-grid gap-40">
            <div class="sobre-texto opacity-0 -translate-x-20 transition-all duration-[1500ms]" id="animSobreTexto">
                <h2 id="tituloSobre"></h2>
                <ul id="listaSobre"></ul>
                <p id="textoSobre"></p>
            </div>
            <img src="img/natalia.jpeg" class="opacity-0 translate-x-20 transition-all duration-[1500ms]"
                id="animSobreImg">
        </div>
    </section>

    <section class="servicos" id="servicos">
        <h2 id="tituloServicos"></h2>
        <div class="servicos-grid" id="servicosContainer"></div>
    </section>

    <section id="planos" class="py-20 bg-[#f5f7f8]">
        <div class="max-w-5xl mx-auto px-6">

            <h2 class="text-4xl font-bold text-center mb-12 text-[#3986C5]">
                Planos e Preços
            </h2>

            <div id="planosContainer" class="grid md:grid-cols-2 gap-8"></div>

        </div>
    </section>

    <section id="depoimentos" class="py-20 bg-[#f5f7f8]">

        <div class="max-w-6xl mx-auto px-6">

            <h2 class="text-4xl font-bold text-center mb-10">
                Depoimentos
            </h2>

            <div class="relative overflow-hidden">

                <!-- TRACK -->
                <div id="depoTrack" class="flex transition-transform duration-500">

                    <!-- JS vai preencher -->

                </div>

                <!-- BOTÕES -->
                <div class="flex justify-center gap-4 mt-6">

                    <button id="depPrev" class="bg-white px-4 py-2 rounded shadow hover:bg-gray-100">
                        ❮
                    </button>

                    <button id="depNext" class="bg-white px-4 py-2 rounded shadow hover:bg-gray-100">
                        ❯
                    </button>

                </div>

            </div>

        </div>

    </section>
    <!-- Parte do footer do contato-->

    <footer id="footer" class="text-white py-16">

        <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-10">

            <!-- SOBRE -->
            <div>
                <h2 id="footerTitulo" class="text-xl font-bold mb-4 text-[#69D7DC]"></h2>

                <p id="footerDescricao" class="text-gray-300 text-sm leading-relaxed"></p>

                <p class="text-black text-xs mt-6">
                    © 2026 Studio de Pilates
                </p>
            </div>

            <!-- CONTATO -->
            <div>
                <h2 class="text-lg font-semibold mb-4">Contato</h2>

                <p id="footerEndereco" class="text-gray-300 mb-2"></p>

                <p id="footerTelefone" class="text-gray-300 mb-2"></p>

                <p id="footerInstagram" class="text-gray-300 mb-2"></p>

                <p id="footerFacebook" class="text-gray-300 mb-2"></p>

                <p id="footerEmail" class="text-gray-300"></p>
            </div>

            <!-- MAPA -->
            <div>
                <h2 class="text-lg font-semibold mb-4">Localização</h2>

                <div class="w-full h-[200px] rounded-xl overflow-hidden">
                    <iframe id="footerMapa" class="w-full h-full border-0" loading="lazy">
                    </iframe>
                </div>
            </div>

        </div>

    </footer>



    <script type="module" src="js/main.js"></script>

</body>

</html>
